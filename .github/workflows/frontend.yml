name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker build -t hamzabenhmida98/hospital-frontend:${{ github.sha }} .
          docker push hamzabenhmida98/hospital-frontend:${{ github.sha }}
          docker tag hamzabenhmida98/hospital-frontend:${{ github.sha }} hamzabenhmida98/hospital-frontend:latest
          docker push hamzabenhmida98/hospital-frontend:latest
