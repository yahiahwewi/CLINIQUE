apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hospital-backend
  template:
    metadata:
      labels:
        app: hospital-backend
    spec:
      containers:
        - name: backend
          image: hospital-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: hospital-config
            - secretRef:
                name: hospital-secrets
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
