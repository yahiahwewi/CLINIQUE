<router-outlet />

<!-- Toast container (kept from existing notification.service for transient feedback) -->
<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
  <div
    *ngFor="let notification of notifications"
    [ngClass]="{
      'border-l-sage-500':  notification.type === 'success',
      'border-l-coral-500': notification.type === 'error',
      'border-l-lumen-500': notification.type === 'info',
      'border-l-amber-500': notification.type === 'warning'
    }"
    class="lumen-card pointer-events-auto flex w-80 items-start gap-3 border-l-4 p-4 animate-slide-in"
  >
    <div class="flex-1">
      <p class="text-sm font-medium text-ink-900">{{ notification.message }}</p>
    </div>
    <button
      (click)="closeNotification(notification.id)"
      class="text-ink-500 transition hover:text-ink-900"
      aria-label="Dismiss"
    >
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
