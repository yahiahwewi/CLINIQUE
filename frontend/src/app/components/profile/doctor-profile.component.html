<div class="space-y-6">
  <header>
    <p class="text-[11px] uppercase tracking-[0.18em] text-ink-500">Profile</p>
    <h1 class="mt-1 font-display text-3xl font-semibold text-lumen-900">My doctor profile</h1>
    <p class="mt-1 max-w-xl text-sm text-ink-500">
      What patients see when they're choosing a doctor — make it count.
    </p>
  </header>

  <div *ngIf="loading()" class="space-y-2">
    <div class="lumen-skeleton h-12 w-full"></div>
    <div class="lumen-skeleton h-32 w-full"></div>
    <div class="lumen-skeleton h-24 w-full"></div>
  </div>

  <form *ngIf="!loading()" [formGroup]="form" (ngSubmit)="save()" class="lumen-card space-y-6 p-6">
    <section>
      <p class="lumen-label">Departments</p>
      <p class="mb-2 text-[11px] text-ink-500">A doctor can serve more than one department.</p>
      <div class="flex flex-wrap gap-2">
        <button *ngFor="let d of departments()" type="button"
                (click)="toggleDepartment(d)"
                [class.lumen-btn-primary]="isSelected(d)"
                class="lumen-btn lumen-btn-ghost !px-3 !py-1.5 !text-xs">
          <span *ngIf="d.color" class="mr-1.5 inline-block h-2 w-2 rounded-full" [style.background]="d.color"></span>
          {{ d.name }}
        </button>
      </div>
    </section>

    <section class="grid gap-4 md:grid-cols-2">
      <div>
        <label class="lumen-label">Specialty headline</label>
        <input formControlName="specialty" type="text" placeholder="e.g. Cardiology" class="lumen-input" />
      </div>
      <div>
        <label class="lumen-label">License number</label>
        <input formControlName="licenseNumber" type="text" placeholder="MD-2014-0432" class="lumen-input" />
      </div>
    </section>

    <section>
      <label class="lumen-label">Bio</label>
      <textarea formControlName="bio" rows="4"
                placeholder="A short paragraph about your training, focus, and approach to care."
                class="lumen-input"></textarea>
    </section>

    <section class="grid gap-4 md:grid-cols-3">
      <div>
        <label class="lumen-label">Languages</label>
        <input formControlName="languages" type="text" placeholder="English, French" class="lumen-input" />
      </div>
      <div>
        <label class="lumen-label">Consultation fee (€)</label>
        <input type="number" min="0" step="0.50"
               [value]="feeEuros(form.value.consultationFeeCents)"
               (input)="onFeeChange($any($event.target).value)"
               class="lumen-input" />
        <p class="mt-1 text-[11px] text-ink-500">Display only — no online payment is processed.</p>
      </div>
      <div>
        <label class="lumen-label">Years of experience</label>
        <input formControlName="yearsExperience" type="number" min="0" class="lumen-input" />
      </div>
    </section>

    <section>
      <label class="lumen-label">Photo URL <span class="text-ink-500">(optional)</span></label>
      <input formControlName="photoUrl" type="url" placeholder="https://…" class="lumen-input" />
    </section>

    <div *ngIf="error()" class="rounded-lg border border-coral-500/30 bg-coral-500/8 px-4 py-3 text-sm text-coral-600">{{ error() }}</div>
    <div *ngIf="saved()" class="rounded-lg border border-sage-500/30 bg-sage-500/8 px-4 py-3 text-sm text-sage-600">Profile saved.</div>

    <div class="flex justify-end">
      <button type="submit" [disabled]="saving()" class="lumen-btn lumen-btn-primary">
        <span *ngIf="!saving()">Save changes</span>
        <span *ngIf="saving()">Saving…</span>
      </button>
    </div>
  </form>
</div>
