<div class="flex min-h-screen items-center justify-center bg-canvas-100 px-4 py-12">
  <div class="w-full max-w-md">
    <div class="mb-8 flex items-center gap-2.5">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-lumen-700">
        <svg viewBox="0 0 32 32" class="h-5 w-5" fill="none" stroke="#F4EFE6" stroke-width="2.5" stroke-linecap="round">
          <path d="M11 16a5 5 0 0 1 10 0" />
          <path d="M16 11a5 5 0 0 1 0 10" />
        </svg>
      </span>
      <p class="font-display text-lg font-semibold text-lumen-900">Lumen Health</p>
    </div>

    <p class="text-[11px] uppercase tracking-[0.2em] text-ink-500">Reset access</p>
    <h1 class="mt-2 font-display text-3xl font-semibold text-lumen-900">Set a new password.</h1>
    <p class="mt-2 text-sm leading-6 text-ink-500">
      Paste the token you received and pick a new password.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-8 space-y-5">
      <div>
        <label class="lumen-label">Reset token</label>
        <input formControlName="token" type="text" placeholder="Paste your reset token here"
               class="lumen-input font-mono"
               [class.is-invalid]="submitted && f['token'].errors" />
        <div *ngIf="submitted && f['token'].errors?.['required']" class="mt-1.5 text-xs text-coral-600">Token is required.</div>
      </div>

      <div>
        <label class="lumen-label">New password</label>
        <input formControlName="password" type="password" autocomplete="new-password"
               class="lumen-input"
               [class.is-invalid]="submitted && f['password'].errors" />
        <div *ngIf="submitted && f['password'].errors" class="mt-1.5 text-xs text-coral-600">
          <span *ngIf="f['password'].errors['required']">Password is required.</span>
          <span *ngIf="f['password'].errors['minlength']">At least 6 characters.</span>
        </div>
      </div>

      <div>
        <label class="lumen-label">Confirm new password</label>
        <input formControlName="confirmPassword" type="password" autocomplete="new-password"
               class="lumen-input"
               [class.is-invalid]="submitted && (f['confirmPassword'].errors || form.errors?.['passwordMismatch'])" />
        <div *ngIf="submitted && form.errors?.['passwordMismatch']" class="mt-1.5 text-xs text-coral-600">
          Passwords do not match.
        </div>
      </div>

      <div *ngIf="successMessage" class="rounded-lg border border-sage-500/30 bg-sage-500/8 px-4 py-3 text-sm text-sage-600">
        {{ successMessage }}
      </div>

      <div *ngIf="error" class="rounded-lg border border-coral-500/30 bg-coral-500/8 px-4 py-3 text-sm text-coral-600">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading" class="lumen-btn lumen-btn-primary w-full">
        <span *ngIf="!loading">Reset password</span>
        <span *ngIf="loading">Resetting…</span>
      </button>

      <p class="pt-2 text-center text-sm text-ink-500">
        Remembered it?
        <a routerLink="/login" class="font-medium text-lumen-700 transition hover:text-lumen-900">Sign in</a>
      </p>
    </form>
  </div>
</div>
