<div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(14,165,233,0.15),_transparent_40%),linear-gradient(135deg,_#eff6ff,_#f8fafc)] px-4 py-10">
  <div class="mx-auto max-w-2xl rounded-[2rem] border border-white/70 bg-white/95 p-8 shadow-[0_20px_70px_-34px_rgba(15,23,42,0.35)] backdrop-blur sm:p-10">
    <p class="text-sm font-semibold uppercase tracking-[0.22em] text-sky-600">Password support</p>
    <h1 class="mt-2 text-3xl font-semibold text-slate-900">Forgot your password?</h1>
    <p class="mt-3 text-sm leading-6 text-slate-500">
      Enter your email and we&apos;ll generate a reset token. In this Sprint 1 build, the token is logged by the backend as a mock email.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-8 space-y-5">
      <div>
        <label for="email" class="mb-2 block text-sm font-medium text-slate-700">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-slate-900 shadow-sm transition focus:border-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-100"
          placeholder="you@example.com"
          [ngClass]="{ 'border-red-400 ring-4 ring-red-100': submitted && f['email'].errors }"
        />
        <div *ngIf="submitted && f['email'].errors" class="mt-2 text-sm text-red-600">
          <div *ngIf="f['email'].errors['required']">Email is required.</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email address.</div>
        </div>
      </div>

      <div *ngIf="successMessage" class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
        {{ successMessage }}
      </div>

      <div *ngIf="error" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="flex w-full items-center justify-center rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-700 disabled:cursor-not-allowed disabled:bg-slate-400"
      >
        <span *ngIf="!loading">Send Reset Instructions</span>
        <span *ngIf="loading">Preparing reset token...</span>
      </button>

      <div class="flex flex-wrap items-center justify-between gap-4 text-sm text-slate-500">
        <a routerLink="/login" class="font-semibold text-indigo-600 transition hover:text-indigo-700">Back to login</a>
        <a routerLink="/reset-password" class="font-semibold text-sky-600 transition hover:text-sky-700">Already have a token?</a>
      </div>
    </form>
  </div>
</div>
