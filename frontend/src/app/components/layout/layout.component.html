<div class="min-h-screen bg-canvas-100 text-ink-700">
  <div class="flex min-h-screen">
    <!-- Rail nav -->
    <aside
      class="sticky top-0 flex h-screen flex-col border-r border-lumen-700/8 bg-white/80 backdrop-blur transition-[width] duration-200"
      [class.w-64]="!collapsed()"
      [class.w-[72px]]="collapsed()"
    >
      <div class="flex items-center justify-between gap-2 px-4 py-5">
        <lumen-brand-mark [iconOnly]="collapsed()"></lumen-brand-mark>
        <button
          (click)="toggleCollapsed()"
          class="hidden rounded-md p-1 text-ink-500 transition hover:bg-canvas-50 hover:text-lumen-700 md:inline-flex"
          [class.!ml-0]="collapsed()"
          aria-label="Toggle sidebar"
        >
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="!collapsed()" d="M15 6l-6 6 6 6" />
            <path *ngIf="collapsed()" d="M9 6l6 6-6 6" />
          </svg>
        </button>
      </div>

      <nav class="mt-2 flex flex-1 flex-col gap-1 px-3">
        <a *ngFor="let item of visibleNav()"
           [routerLink]="item.route"
           routerLinkActive="bg-lumen-700 text-white shadow-sm"
           [routerLinkActiveOptions]="{ exact: false }"
           class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-ink-700 transition hover:bg-canvas-50 hover:text-lumen-900"
           [title]="item.label"
        >
          <span class="inline-flex h-5 w-5 shrink-0 items-center justify-center">
            <ng-container [ngSwitch]="item.icon">
              <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M3 11l9-8 9 8" /><path d="M5 10v10h14V10" /><path d="M10 20v-6h4v6" />
              </svg>
              <svg *ngSwitchCase="'calendar'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <rect x="3" y="5" width="18" height="16" rx="2" /><path d="M3 10h18" /><path d="M8 3v4M16 3v4" />
              </svg>
              <svg *ngSwitchCase="'clock'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" />
              </svg>
              <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M16 11a4 4 0 1 0-8 0 4 4 0 0 0 8 0z" /><path d="M3 21v-1a5 5 0 0 1 5-5h8a5 5 0 0 1 5 5v1" />
              </svg>
              <svg *ngSwitchCase="'shield'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z" />
              </svg>
              <svg *ngSwitchCase="'check'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z" /><path d="M8 12l3 3 5-6" />
              </svg>
              <svg *ngSwitchCase="'id'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <rect x="3" y="5" width="18" height="14" rx="2" /><circle cx="9" cy="12" r="2.5" /><path d="M14 10h5M14 14h5M6 16c0-1.5 1.5-2.5 3-2.5s3 1 3 2.5" />
              </svg>
              <svg *ngSwitchCase="'palm'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M6 21c0-6 4-10 10-10" /><path d="M16 11l-2-3 4-1-1 4-3-2 4 4-4 1 1-4z" /><path d="M11 21l1-9" />
              </svg>
              <svg *ngSwitchCase="'grid'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
              <svg *ngSwitchCase="'megaphone'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M3 11v2a3 3 0 0 0 3 3h2l8 4V4l-8 4H6a3 3 0 0 0-3 3z" /><path d="M19 8a4 4 0 0 1 0 8" />
              </svg>
              <svg *ngSwitchCase="'book'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M4 4h12a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z" /><path d="M4 17h15" />
              </svg>
              <svg *ngSwitchCase="'arrow'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M5 12h14" /><path d="M13 6l6 6-6 6" />
              </svg>
              <svg *ngSwitchCase="'flask'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <path d="M9 3h6v3l4 13a2 2 0 0 1-2 3H7a2 2 0 0 1-2-3l4-13V3z" />
              </svg>
              <svg *ngSwitchCase="'pill'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
                <rect x="3" y="9" width="18" height="6" rx="3" transform="rotate(-30 12 12)" /><path d="M9 6l6 12" />
              </svg>
            </ng-container>
          </span>
          <span *ngIf="!collapsed()" class="truncate">{{ item.label }}</span>
        </a>
      </nav>

      <div class="border-t border-lumen-700/8 p-3">
        <div class="flex items-center gap-3 rounded-lg px-2 py-2">
          <span class="inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-lumen-100 font-display text-sm font-semibold text-lumen-800">
            {{ initials() }}
          </span>
          <div *ngIf="!collapsed()" class="min-w-0 flex-1">
            <p class="truncate text-sm font-semibold text-lumen-900">{{ currentUser?.firstName }} {{ currentUser?.lastName }}</p>
            <p class="truncate text-xs uppercase tracking-wide text-ink-500">{{ primaryRole() }}</p>
          </div>
        </div>
        <button (click)="logout()"
                class="mt-1 flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-ink-700 transition hover:bg-canvas-50 hover:text-coral-600">
          <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="M16 17l5-5-5-5" /><path d="M21 12H9" />
          </svg>
          <span *ngIf="!collapsed()">Sign out</span>
        </button>
      </div>
    </aside>

    <!-- Main column -->
    <div class="flex min-w-0 flex-1 flex-col">
      <!-- Top bar -->
      <header class="sticky top-0 z-20 flex h-16 items-center gap-3 border-b border-lumen-700/8 bg-canvas-100/80 px-6 backdrop-blur">
        <div class="flex-1">
          <p class="text-[11px] uppercase tracking-[0.18em] text-ink-500">Dashboard</p>
          <p class="font-display text-base font-semibold text-lumen-900">Welcome back, {{ currentUser?.firstName }}</p>
        </div>
        <lumen-notification-bell></lumen-notification-bell>
      </header>

      <main class="flex-1 px-6 py-8">
        <div class="mx-auto max-w-7xl">
          <lumen-announcement-banner></lumen-announcement-banner>
          <router-outlet />
        </div>
      </main>

      <footer class="px-6 py-5 text-center text-[11px] uppercase tracking-[0.18em] text-ink-500">
        Lumen Health · Care, coordinated.
      </footer>
    </div>
  </div>
</div>
